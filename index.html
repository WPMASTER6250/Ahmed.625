<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malik Automation - Registration Form</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  margin: 0;
  padding: 20px;
  background: linear-gradient(135deg, #dbeafe, #eff6ff);
}

/* Watermark */
.watermark {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-20deg);
  font-size: 60px;
  font-weight: bold;
  color: rgba(0,0,0,0.05);
  pointer-events: none;
}

/* Container */
.container {
  max-width: 900px;
  margin: auto;
}

/* Title */
.title {
  text-align: center;
  margin-bottom: 20px;
}

.title h1 {
  margin: 0;
  font-size: 36px;
  color: #2563eb;
}

/* Card */
.card {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

/* Form */
.form-group {
  margin-bottom: 15px;
}

label {
  display: block;
  margin-bottom: 5px;
}

input, select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.phone-row {
  display: flex;
  gap: 10px;
}

.phone-row input {
  flex: 1;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.submit-btn {
  width: 100%;
  background: #2563eb;
  color: white;
  font-size: 18px;
}

.call-btn {
  background: #10b981;
  color: white;
}

/* Table */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ccc;
}

.action-btn {
  margin-right: 5px;
  padding: 5px 10px;
}

.edit-btn {
  background: orange;
  color: white;
}

.delete-btn {
  background: red;
  color: white;
}

.message {
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
}

.success { background: #d1fae5; }
.error { background: #fee2e2; }
</style>
</head>

<body>

<div class="watermark">Malik Automation</div>

<div class="container">

<div class="title">
  <h1>Registration Form</h1>
</div>

<div id="message"></div>

<div class="card">
<form id="studentForm">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Student ID</label>
<input type="text" id="studentId" required>
</div>

<div class="form-group">
<label>Course</label>
<select id="course" required>
<option value="">Select course</option>
<option>Facebook</option>
<option>TikTok</option>
</select>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Phone</label>
<div class="phone-row">
<input type="text" id="phone" required>
<button type="button" class="call-btn" onclick="callNumber()">📞</button>
</div>
</div>

<button type="submit" class="submit-btn">Register Student</button>

</form>
</div>

<div class="card">
<h2>Registered Students</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>ID</th>
<th>Course</th>
<th>Email</th>
<th>Phone</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

</div>

</div>

<script>
const form = document.getElementById("studentForm");
const tableBody = document.getElementById("tableBody");
const message = document.getElementById("message");

let students = [];

function showMessage(text, type) {
  message.innerHTML = `<div class="message ${type}">${text}</div>`;
}

function callNumber() {
  const phone = document.getElementById("phone").value;
  if(phone) window.location.href = "tel:" + phone;
}

form.addEventListener("submit", function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const id = document.getElementById("studentId").value;
  const course = document.getElementById("course").value;
  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;

  if(!name || !id || !course || !email || !phone){
    showMessage("Fill all fields", "error");
    return;
  }

  students.push({name, id, course, email, phone});
  renderTable();
  form.reset();
  showMessage("Student Added", "success");
});

function renderTable(){
  tableBody.innerHTML = "";

  students.forEach((s, index) => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${s.name}</td>
      <td>${s.id}</td>
      <td>${s.course}</td>
      <td>${s.email}</td>
      <td>${s.phone}</td>
      <td>
        <button class="action-btn delete-btn" onclick="deleteStudent(${index})">Delete</button>
      </td>
    `;

    tableBody.appendChild(row);
  });
}

function deleteStudent(index){
  students.splice(index,1);
  renderTable();
}
</script>

</body>
</html>
