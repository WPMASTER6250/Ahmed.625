
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Malik Automation - Registration Form</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #dbeafe, #eff6ff);
      min-height: 100vh;
      color: #111827;
    }

    .watermark {
      position: fixed;
      top: 68%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-20deg);
      font-size: 56px;
      font-weight: 700;
      background: linear-gradient(45deg, #ff4d4d, #7c3aed, #10b981, #2563eb, #f59e0b);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0.28;
      pointer-events: none;
      z-index: 0;
      text-align: center;
      white-space: nowrap;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .title {
      text-align: center;
      margin-bottom: 18px;
    }

    .title h1 {
      margin: 0;
      color: #2563eb;
      font-size: 38px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      font-weight: 600;
      color: #374151;
    }

    input,
    select {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      outline: none;
      font-size: 15px;
      transition: 0.2s ease;
      background: #fff;
    }

    input:focus,
    select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .phone-row {
      display: grid;
      grid-template-columns: 1fr 60px;
      gap: 10px;
      align-items: end;
    }

    .phone-btn {
      height: 46px;
      border: none;
      border-radius: 10px;
      background: #10b981;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
    }

    .primary-btn,
    .secondary-btn,
    .danger-btn {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .primary-btn {
      width: 100%;
      background: #2563eb;
      color: #fff;
      font-weight: 700;
    }

    .primary-btn:hover {
      background: #1d4ed8;
    }

    .secondary-btn {
      background: #111827;
      color: #fff;
    }

    .secondary-btn:hover {
      background: #000;
    }

    .danger-btn {
      background: #dc2626;
      color: #fff;
    }

    .danger-btn:hover {
      background: #b91c1c;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    .section-title {
      margin: 0 0 14px 0;
      font-size: 20px;
      color: #111827;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    thead {
      background: #f3f4f6;
    }

    th,
    td {
      padding: 12px 10px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
      font-size: 14px;
    }

    th {
      color: #111827;
    }

    .small-btn {
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      background: #ef4444;
      color: white;
      font-size: 13px;
    }

    .small-btn:hover {
      background: #dc2626;
    }

    .hidden {
      display: none;
    }

    .note {
      font-size: 13px;
      color: #6b7280;
      margin-top: 8px;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #065f46;
      font-weight: 600;
      min-height: 20px;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .title h1 {
        font-size: 30px;
      }

      .watermark {
        font-size: 42px;
        top: 72%;
      }
    }
  </style>
</head>
<body>
  <div class="watermark">Malik Automation</div>

  <div class="container">
    <div class="title">
      <h1>Registration Form</h1>
    </div>

    <div class="card">
      <form id="studentForm">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" placeholder="Enter full name" required />

        <label for="studentId">Student ID</label>
        <input type="text" id="studentId" placeholder="Enter student ID" required />

        <label for="course">Course</label>
        <select id="course" required>
          <option value="">Select course</option>
          <option>Web Development</option>
          <option>Graphic Design</option>
          <option>Digital Marketing</option>
          <option>MS Office</option>
          <option>English Language</option>
          <option>Computer Basics</option>
        </select>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter email" required />

        <label for="phone">Phone</label>
        <div class="phone-row">
          <input type="tel" id="phone" placeholder="Enter phone number" required />
          <button type="button" class="phone-btn" title="Call">📞</button>
        </div>

        <button type="submit" class="primary-btn">Register Student</button>
        <div class="status" id="statusMsg"></div>
      </form>
    </div>

    <div class="card">
      <div class="toolbar">
        <button type="button" class="secondary-btn" id="showAdminBtn">Show My Student Data</button>
        <button type="button" class="danger-btn hidden" id="hideAdminBtn">Hide Student Data</button>
      </div>

      <div id="studentsSection" class="hidden">
        <h2 class="section-title">Registered Students</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>ID</th>
                <th>Course</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="studentTableBody"></tbody>
          </table>
        </div>
        <p class="note">Yeh section sirf admin PIN se show hota hai on this browser.</p>
      </div>
    </div>
  </div>

  <script>
    const ADMIN_PIN = "7860";

    const form = document.getElementById("studentForm");
    const statusMsg = document.getElementById("statusMsg");
    const studentTableBody = document.getElementById("studentTableBody");
    const studentsSection = document.getElementById("studentsSection");
    const showAdminBtn = document.getElementById("showAdminBtn");
    const hideAdminBtn = document.getElementById("hideAdminBtn");

    let students = JSON.parse(localStorage.getItem("students")) || [];
    let adminView = localStorage.getItem("adminView") === "true";

    function saveStudents() {
      localStorage.setItem("students", JSON.stringify(students));
    }

    function saveAdminView(value) {
      localStorage.setItem("adminView", value ? "true" : "false");
      adminView = value;
      updateAdminView();
    }

    function updateAdminView() {
      if (adminView) {
        studentsSection.classList.remove("hidden");
        hideAdminBtn.classList.remove("hidden");
      } else {
        studentsSection.classList.add("hidden");
        hideAdminBtn.classList.add("hidden");
      }
    }

    function renderStudents() {
      studentTableBody.innerHTML = "";

      if (students.length === 0) {
        studentTableBody.innerHTML = `
          <tr>
            <td colspan="6" style="text-align:center; color:#6b7280;">No student registered yet.</td>
          </tr>
        `;
        return;
      }

      students.forEach((student, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${escapeHtml(student.fullName)}</td>
          <td>${escapeHtml(student.studentId)}</td>
          <td>${escapeHtml(student.course)}</td>
          <td>${escapeHtml(student.email)}</td>
          <td>${escapeHtml(student.phone)}</td>
          <td><button class="small-btn" onclick="deleteStudent(${index})">Delete</button></td>
        `;
        studentTableBody.appendChild(row);
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const student = {
        fullName: document.getElementById("fullName").value.trim(),
        studentId: document.getElementById("studentId").value.trim(),
        course: document.getElementById("course").value,
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim()
      };

      if (!student.fullName || !student.studentId || !student.course || !student.email || !student.phone) {
        statusMsg.style.color = "#b91c1c";
        statusMsg.textContent = "Please fill all fields.";
        return;
      }

      students.push(student);
      saveStudents();
      renderStudents();
      form.reset();

      statusMsg.style.color = "#065f46";
      statusMsg.textContent = "Student registered successfully.";
    });

    showAdminBtn.addEventListener("click", function () {
      const pin = prompt("Enter admin PIN to view student details:");

      if (pin === null) return;

      if (pin === ADMIN_PIN) {
        saveAdminView(true);
        alert("Admin view enabled.");
      } else {
        alert("Wrong PIN.");
      }
    });

    hideAdminBtn.addEventListener("click", function () {
      saveAdminView(false);
      alert("Student details hidden.");
    });

    window.deleteStudent = function (index) {
      const ok = confirm("Delete this student record?");
      if (!ok) return;

      students.splice(index, 1);
      saveStudents();
      renderStudents();
    };

    renderStudents();
    updateAdminView();
  </script>
</body>
</html>
