<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Registration System</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body 
          body {
  margin: 0;
  padding: 20px;
  background: linear-gradient(135deg, #dbeafe, #eff6ff);<div class="watermark">Malik Automation</div>
}
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .title {
      text-align: center;
      margin-bottom: 20px;
    }

    .title h1 {
      margin: 0 0 8px;
      font-size: 40px;
      color: #2563eb;
    }

    .title p {
      margin: 0;
      color: #4b5563;
      font-size: 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 28px;
      color: #0f172a;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
      font-weight: bold;
      color: #374151;
    }

    input,
    select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      font-size: 16px;
      outline: none;
      background: #fff;
    }

    input:focus,
    select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .phone-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .phone-row input {
      flex: 1;
    }

    .call-btn {
      min-width: 60px;
      height: 52px;
      border: none;
      background: #10b981;
      color: white;
      font-size: 22px;
      border-radius: 14px;
      cursor: pointer;
    }

    .submit-btn {
      width: 100%;
      border: none;
      background: #2563eb;
      color: white;
      padding: 15px 20px;
      border-radius: 14px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }

    .submit-btn:hover {
      background: #1d4ed8;
    }

    .message {
      display: none;
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 14px;
      font-weight: 600;
    }

    .message.success {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    .message.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    th,
    td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
      font-size: 15px;
    }

    th {
      background: #f8fafc;
      color: #111827;
    }

    .empty {
      text-align: center;
      color: #6b7280;
      padding: 20px;
    }

    .action-btn {
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      margin-right: 6px;
      font-size: 13px;
    }

    .edit-btn {
      background: #f59e0b;
    }

    .delete-btn {
      background: #ef4444;
    }

    @media (max-width: 768px) {
      .title h1 {
        font-size: 28px;
      }

      .card {
        padding: 18px;
      }

      .card h2 {
        font-size: 22px;
      }

      input,
      select {
        font-size: 15px;
        padding: 12px 14px;
      }

      .submit-btn {
        font-size: 18px;
      }

      .call-btn {
        min-width: 56px;
        height: 48px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">
      <h1>Student Registration System</h1>
      <p>Register and manage student records</p>
    </div>

    <div class="card">
      <h2 id="formHeading">Register Student</h2>

      <div id="messageBox" class="message"></div>

      <form id="studentForm">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" placeholder="Enter full name" required />
        </div>

        <div class="form-group">
          <label for="studentId">Student ID</label>
          <input type="text" id="studentId" placeholder="Enter student ID" required />
        </div>

        <div class="form-group">
  <label for="department">Course</label>
  <select id="department" required>
    <option value="">Select course</option>
    <option value="Facebook">Facebook</option>
    <option value="TikTok">TikTok</option>
  </select>
</div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter email" required />
        </div>

        <div class="form-group">
          <label for="phone">Phone</label>
          <div class="phone-row">
            <input type="text" id="phone" placeholder="Enter phone number" required />
            <button type="button" id="callBtn" class="call-btn">📞</button>
          </div>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn">Register Student</button>
      </form>
    </div>

    <div class="card">
      <h2>Registered Students</h2>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>ID</th>
              <th>Department</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="studentTableBody">
            <tr>
              <td colspan="6" class="empty">No students registered yet.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const studentForm = document.getElementById("studentForm");
    const fullName = document.getElementById("fullName");
    const studentId = document.getElementById("studentId");
    const department = document.getElementById("department");
    const email = document.getElementById("email");
    const phone = document.getElementById("phone");
    const callBtn = document.getElementById("callBtn");
    const studentTableBody = document.getElementById("studentTableBody");
    const submitBtn = document.getElementById("submitBtn");
    const formHeading = document.getElementById("formHeading");
    const messageBox = document.getElementById("messageBox");

    let students = JSON.parse(localStorage.getItem("students")) || [];
    let editIndex = -1;

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = "message " + type;

      setTimeout(() => {
        messageBox.className = "message";
        messageBox.textContent = "";
      }, 2500);
    }

    function saveToLocalStorage() {
      localStorage.setItem("students", JSON.stringify(students));
    }

    function validateEmail(emailValue) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailValue);
    }

    function validatePhone(phoneValue) {
      return /^[0-9+\-\s]{7,15}$/.test(phoneValue);
    }

    function renderStudents() {
      studentTableBody.innerHTML = "";

      if (students.length === 0) {
        studentTableBody.innerHTML = `
          <tr>
            <td colspan="6" class="empty">No students registered yet.</td>
          </tr>
        `;
        return;
      }

      students.forEach((student, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${student.fullName}</td>
          <td>${student.studentId}</td>
          <td>${student.department}</td>
          <td>${student.email}</td>
          <td>${student.phone}</td>
          <td>
            <button type="button" class="action-btn edit-btn" onclick="editStudent(${index})">Edit</button>
            <button type="button" class="action-btn delete-btn" onclick="deleteStudent(${index})">Delete</button>
          </td>
        `;
        studentTableBody.appendChild(row);
      });
    }

    function resetForm() {
      studentForm.reset();
      editIndex = -1;
      submitBtn.textContent = "Register Student";
      formHeading.textContent = "Register Student";
    }

    studentForm.addEventListener("submit", function (e) {
      e.preventDefault();

      const nameValue = fullName.value.trim();
      const idValue = studentId.value.trim();
      const departmentValue = department.value;
      const emailValue = email.value.trim();
      const phoneValue = phone.value.trim();

      if (!nameValue || !idValue || !departmentValue || !emailValue || !phoneValue) {
        showMessage("Please fill all fields.", "error");
        return;
      }

      if (!validateEmail(emailValue)) {
        showMessage("Please enter a valid email.", "error");
        return;
      }

      if (!validatePhone(phoneValue)) {
        showMessage("Please enter a valid phone number.", "error");
        return;
      }

      const duplicateIndex = students.findIndex((student, index) => {
        return student.studentId.toLowerCase() === idValue.toLowerCase() && index !== editIndex;
      });

      if (duplicateIndex !== -1) {
        showMessage("Student ID already exists.", "error");
        return;
      }

      const studentData = {
        fullName: nameValue,
        studentId: idValue,
        department: departmentValue,
        email: emailValue,
        phone: phoneValue
      };

      if (editIndex === -1) {
        students.push(studentData);
        showMessage("Student registered successfully.", "success");
      } else {
        students[editIndex] = studentData;
        showMessage("Student updated successfully.", "success");
      }

      saveToLocalStorage();
      renderStudents();
      resetForm();
    });

    callBtn.addEventListener("click", function () {
      const number = phone.value.trim();

      if (!number) {
        showMessage("Enter phone number first.", "error");
        return;
      }

      window.location.href = "tel:" + number;
    });

    function editStudent(index) {
      const student = students[index];

      fullName.value = student.fullName;
      studentId.value = student.studentId;
      department.value = student.department;
      email.value = student.email;
      phone.value = student.phone;

      editIndex = index;
      submitBtn.textContent = "Update Student";
      formHeading.textContent = "Edit Student";

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    }

    function deleteStudent(index) {
      const isConfirmed = confirm("Are you sure you want to delete this student?");

      if (!isConfirmed) {
        return;
      }

      students.splice(index, 1);
      saveToLocalStorage();
      renderStudents();
      showMessage("Student deleted successfully.", "success");

      if (editIndex === index) {
        resetForm();
      }
    }

    window.editStudent = editStudent;
    window.deleteStudent = deleteStudent;

    renderStudents();
  </script>
</body>
</html>
